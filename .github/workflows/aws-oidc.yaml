name: AWS OIDC Test

on:
  push:
    branches: [main]

permissions:
  id-token: write   # REQUIRED
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::629954427528:role/Github-actions
          aws-region: us-east-1

      - name: Create S3 Bucket
        run: |
          aws s3 mb s3://my-oidc-test-bucket-12345
